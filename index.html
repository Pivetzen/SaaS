<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SaaS Hub de Vencimentos</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
</head>
<body class="bg-gray-900 text-gray-100 min-h-screen font-sans">

    <!-- 1. TELA DE LOGIN -->
    <div id="loginSection" class="flex flex-col items-center justify-center min-h-screen px-4">
        <div class="bg-gray-800 p-8 rounded-lg shadow-xl w-full max-w-md border border-gray-700">
            <h2 class="text-2xl font-bold mb-6 text-center text-blue-400">SaaS Finanças - Login</h2>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium mb-1">E-mail</label>
                    <input type="email" id="emailInput" class="w-full p-2.5 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500">
                </div>
                <div>
                    <label class="block text-sm font-medium mb-1">Senha</label>
                    <input type="password" id="passInput" class="w-full p-2.5 rounded bg-gray-700 border border-gray-600 focus:outline-none focus:border-blue-500">
                </div>
                <button onclick="handleLogin()" class="w-full bg-blue-600 hover:bg-blue-700 font-medium py-2.5 rounded transition">Entrar no Sistema</button>
                <p id="loginError" class="text-red-400 text-sm text-center hidden"></p>
            </div>
        </div>
    </div>

    <!-- 2. PAINEL PRINCIPAL -->
    <div id="mainDashboard" class="container mx-auto p-4 max-w-6xl hidden">
        <header class="flex justify-between items-center mb-8 border-b border-gray-800 pb-4">
            <div>
                <h1 class="text-2xl font-bold text-white">Hub de Controle Financeiro</h1>
                <p id="userInfo" class="text-sm text-gray-400"></p>
            </div>
            <button onclick="handleLogout()" class="bg-gray-700 hover:bg-gray-600 text-sm px-4 py-2 rounded transition">Sair</button>
        </header>

        <!-- CARTÕES MÉTRICOS -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-8">
            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700">
                <p class="text-gray-400 text-sm font-medium">A Receber (Pendente)</p>
                <p id="cardA_Receber" class="text-3xl font-bold text-yellow-400">R$ 0,00</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700">
                <p class="text-gray-400 text-sm font-medium">Total Inadimplente</p>
                <p id="cardAtrasado" class="text-3xl font-bold text-red-500">R$ 0,00</p>
            </div>
            <div class="bg-gray-800 p-6 rounded-lg border border-gray-700">
                <p class="text-gray-400 text-sm font-medium">Total Liquidado (Pago)</p>
                <p id="cardPago" class="text-3xl font-bold text-green-500">R$ 0,00</p>
            </div>
        </div>

        <!-- FORMULÁRIO DE REGISTRO (APENAS PARA ADMIN) -->
        <div id="adminFormSection" class="bg-gray-800 p-6 rounded-lg border border-gray-700 mb-8 hidden">
            <h3 class="text-lg font-bold mb-4 text-blue-400">Cadastrar Novo Recebimento</h3>
            <div class="grid grid-cols-1 md:grid-cols-4 gap-4">
                <input type="text" id="formCliente" placeholder="Nome do Cliente" class="p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500">
                <input type="text" id="formContato" placeholder="(85) 99999-9999" maxlength="15" oninput="maskWhatsApp(this)" class="p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500">
                <input type="text" id="formValor" placeholder="R$ 0,00" oninput="maskMoney(this)" class="p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500">
                <input type="date" id="formVencimento" class="p-2 bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500">
            </div>
            <button onclick="createNewRecord()" class="mt-4 bg-blue-600 hover:bg-blue-700 text-white font-medium px-6 py-2 rounded transition">Salvar Lançamento</button>
        </div>

        <!-- RECURSOS DE FILTRAGEM E BUSCA -->
        <div class="bg-gray-800 p-4 rounded-t-lg border-t border-x border-gray-700 flex flex-col md:flex-row md:justify-between gap-4">
            <div class="flex flex-wrap gap-2" id="filterButtonGroup">
                <button onclick="setFilter('todos')" id="btn-filter-todos" class="px-4 py-1.5 rounded text-sm font-medium bg-blue-600 text-white">Todos</button>
                <button onclick="setFilter('em-dia')" id="btn-filter-em-dia" class="px-4 py-1.5 rounded text-sm font-medium bg-gray-700 hover:bg-gray-600 text-gray-300">Em dia</button>
                <button onclick="setFilter('atrasados')" id="btn-filter-atrasados" class="px-4 py-1.5 rounded text-sm font-medium bg-gray-700 hover:bg-gray-600 text-gray-300">Inadimplentes</button>
                <button onclick="setFilter('pagos')" id="btn-filter-pagos" class="px-4 py-1.5 rounded text-sm font-medium bg-gray-700 hover:bg-gray-600 text-gray-300">Liquidados</button>
            </div>
            <div class="w-full md:w-64">
                <input type="text" id="tableSearch" oninput="applyFilters()" placeholder="Buscar cliente..." class="w-full p-1.5 text-sm bg-gray-700 rounded border border-gray-600 focus:outline-none focus:border-blue-500">
            </div>
        </div>

        <!-- TABELA DE REGISTROS -->
        <div class="bg-gray-800 rounded-b-lg border border-gray-700 overflow-hidden">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-gray-700 text-gray-300 text-sm uppercase">
                            <th class="p-3">ID</th>
                            <th class="p-3">Cliente</th>
                            <th class="p-3">Contato</th>
                            <th class="p-3">Valor</th>
                            <th class="p-3">Vencimento</th>
                            <th class="p-3">Status</th>
                            <th class="p-3 text-center">Ações</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody" class="divide-y divide-gray-700">
                        <!-- Gerado Dinamicamente -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const WEB_APP_URL = "https://script.google.com/macros/s/AKfycbxGPvyFic5j-1Q72Xoju1HW58lh-hYRBmRvIlX6V6UIEiboyM6QFzn2uzgq__4M38SG/exec";

        let currentUser = JSON.parse(localStorage.getItem("saas_user")) || null;
        let globalRecords = []; // Cache local para busca e filtros rápidos sem nova requisição
        let currentFilter = 'todos';

        window.onload = function() {
            if (currentUser) { showDashboard(); }
        };

        function maskWhatsApp(input) {
            let v = input.value.replace(/\D/g, "");
            v = v.replace(/^(\d{2})(\d)/g, "($1) $2");
            v = v.replace(/(\d)(\d{4})$/, "$1-$2");
            input.value = v;
        }

        function maskMoney(input) {
            let v = input.value.replace(/\D/g, "");
            v = (v / 100).toFixed(2) + "";
            v = v.replace(".", ",");
            v = v.replace(/(\d)(?=(\d{3})+(?!\d))/g, "$1.");
            input.value = "R$ " + v;
        }

        function formatToBRL(value) {
            return new Intl.NumberFormat('pt-BR', { style: 'currency', currency: 'BRL' }).format(value);
        }

        async function handleLogin() {
            const user = document.getElementById("emailInput").value;
            const pass = document.getElementById("passInput").value;
            const errorElement = document.getElementById("loginError");
            errorElement.classList.add("hidden");

            try {
                let res = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "login", auth_user: user, auth_pass: pass })
                });
                let data = await res.json();

                if (data.success) {
                    currentUser = { email: user, pass: pass, ...data.user };
                    localStorage.setItem("saas_user", JSON.stringify(currentUser));
                    showDashboard();
                } else {
                    errorElement.innerText = data.error;
                    errorElement.classList.remove("hidden");
                }
            } catch (err) {
                errorElement.innerText = "Erro ao conectar com o servidor.";
                errorElement.classList.remove("hidden");
            }
        }

        function showDashboard() {
            document.getElementById("loginSection").classList.add("hidden");
            document.getElementById("mainDashboard").classList.remove("hidden");
            document.getElementById("userInfo").innerText = `Logado como: ${currentUser.email} (${currentUser.nivel}) | Escopo: ${currentUser.empresaId}`;
            
            if (currentUser.nivel === "Admin") {
                document.getElementById("adminFormSection").classList.remove("hidden");
            }
            loadDashboardData();
        }

        async function loadDashboardData() {
            const tableBody = document.getElementById("tableBody");
            tableBody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-gray-400">Carregando registros...</td></tr>`;

            try {
                let res = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({ action: "fetch", auth_user: currentUser.email, auth_pass: currentUser.pass })
                });
                let result = await res.json();

                if (result.success) {
                    globalRecords = result.data;
                    calculateMetrics(globalRecords);
                    applyFilters();
                }
            } catch(e) {
                tableBody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-red-400">Erro ao carregar dados.</td></tr>`;
            }
        }

        // Calcula as métricas globais dos cards (sempre baseado no total absoluto)
        function calculateMetrics(records) {
            let sumPendente = 0, sumAtrasado = 0, sumPago = 0;
            const hoje = new Date();
            hoje.setHours(0,0,0,0);

            records.forEach(rec => {
                let cleanValue = typeof rec.valor === "string" ? parseFloat(rec.valor.replace(/[^\d,-]/g, "").replace(",", ".")) : parseFloat(rec.valor);
                if (rec.status === "Pago") {
                    sumPago += cleanValue;
                } else {
                    sumPendente += cleanValue;
                    const venc = new Date(rec.vencimento + "T00:00:00");
                    if (venc - hoje < 0) sumAtrasado += cleanValue;
                }
            });

            document.getElementById("cardA_Receber").innerText = formatToBRL(sumPendente);
            document.getElementById("cardAtrasado").innerText = formatToBRL(sumAtrasado);
            document.getElementById("cardPago").innerText = formatToBRL(sumPago);
        }

        function setFilter(filterType) {
            currentFilter = filterType;
            const buttons = document.querySelectorAll("#filterButtonGroup button");
            buttons.forEach(btn => {
                btn.classList.remove("bg-blue-600", "text-white");
                btn.classList.add("bg-gray-700", "text-gray-300", "hover:bg-gray-600");
            });

            const activeBtn = document.getElementById(`btn-filter-${filterType}`);
            activeBtn.classList.remove("bg-gray-700", "text-gray-300", "hover:bg-gray-600");
            activeBtn.classList.add("bg-blue-600", "text-white");

            applyFilters();
        }

        // Aplica o filtro de status e a pesquisa por nome combinados de forma síncrona e ultrarrápida
        function applyFilters() {
            const tableBody = document.getElementById("tableBody");
            const searchTerm = document.getElementById("tableSearch").value.toLowerCase();
            tableBody.innerHTML = "";

            const hoje = new Date();
            hoje.setHours(0,0,0,0);

            let filtered = globalRecords.filter(rec => {
                // Filtro de Busca por Nome
                if (searchTerm && !rec.cliente.toLowerCase().includes(searchTerm)) return false;

                // Filtro de Status
                const venc = new Date(rec.vencimento + "T00:00:00");
                const isAtrasado = (venc - hoje < 0) && rec.status !== "Pago";

                if (currentFilter === 'pagos') return rec.status === 'Pago';
                if (currentFilter === 'atrasados') return isAtrasado;
                if (currentFilter === 'em-dia') return rec.status === 'Pendente' && !isAtrasado;
                
                return true; // 'todos'
            });

            if (filtered.length === 0) {
                tableBody.innerHTML = `<tr><td colspan="7" class="p-4 text-center text-gray-500">Nenhum registro corresponde aos filtros selecionados.</td></tr>`;
                return;
            }

            filtered.forEach(rec => {
                const venc = new Date(rec.vencimento + "T00:00:00");
                const diffTime = venc - hoje;
                const diffDays = Math.ceil(diffTime / (1000 * 60 * 60 * 24));

                let badgeColor = "bg-green-600";
                let statusLabel = "Em dia";
                let actionButton = "";

                let cleanValue = typeof rec.valor === "string" ? parseFloat(rec.valor.replace(/[^\d,-]/g, "").replace(",", ".")) : parseFloat(rec.valor);

                if (rec.status === "Pago") {
                    badgeColor = "bg-blue-600";
                    statusLabel = "Liquidado";
                    actionButton = `<span class="text-xs text-gray-500 font-medium">Sem ações</span>`;
                } else {
                    if (diffDays < 0) {
                        badgeColor = "bg-red-600";
                        statusLabel = `Atrasado (${Math.abs(diffDays)}d)`;
                    } else {
                        statusLabel = `Vence em ${diffDays}d`;
                        if (diffDays <= 5) badgeColor = "bg-orange-500";
                    }
                    
                    // Só exibe o botão de dar baixa se o registro estiver Pendente
                    actionButton = `<button onclick="markAsPaid('${rec.id}')" title="Dar Baixa" class="bg-green-600 hover:bg-green-700 text-white text-xs font-bold px-3 py-1 rounded shadow cursor-pointer transition">✓ Recebido</button>`;
                }

                tableBody.innerHTML += `
                    <tr class="hover:bg-gray-750 transition">
                        <td class="p-3 font-mono text-sm text-gray-400">${rec.id}</td>
                        <td class="p-3 font-medium text-white">${rec.cliente}</td>
                        <td class="p-3 text-gray-300">${rec.contato}</td>
                        <td class="p-3 text-white font-semibold">${formatToBRL(cleanValue)}</td>
                        <td class="p-3 text-gray-300">${rec.vencimento.split('-').reverse().join('/')}</td>
                        <td class="p-3"><span class="${badgeColor} text-xs font-bold px-2 py-1 rounded text-white">${statusLabel}</span></td>
                        <td class="p-3 text-center">${actionButton}</td>
                    </tr>
                `;
            });
        }

        // FUNÇÃO DE BAIXA DO SQUAD: Atualiza o status em tempo real
        async function markAsPaid(recordId) {
            if (!confirm(`Deseja confirmar o recebimento do lançamento ${recordId}?`)) return;

            try {
                let res = await fetch(WEB_APP_URL, {
                    method: "POST",
                    body: JSON.stringify({
                        action: "updateStatus",
                        auth_user: currentUser.email,
                        auth_pass: currentUser.pass,
                        id: recordId,
                        newStatus: "Pago"
                    })
                });
                let data = await res.json();
                if (data.success) {
                    alert("Pagamento processado com sucesso!");
                    loadDashboardData(); // Recarrega os dados atualizando os cartões e a tabela
                } else {
                    alert(data.error);
                }
            } catch (err) {
                alert("Erro ao processar baixa de pagamento.");
            }
        }

        async function createNewRecord() {
            const cliente = document.getElementById("formCliente").value;
            const contato = document.getElementById("formContato").value;
            let valorRaw = document.getElementById("formValor").value;
            const vencimento = document.getElementById("formVencimento").value;

            if(!cliente || !valorRaw || !vencimento) {
                alert("Preencha todos os campos obrigatórios.");
                return;
            }

            let valorLimpo = parseFloat(valorRaw.replace(/[^\d,-]/g, "").replace(",", "."));

            let res = await fetch(WEB_APP_URL, {
                method: "POST",
                body: JSON.stringify({
                    action: "create",
                    auth_user: currentUser.email,
                    auth_pass: currentUser.pass,
                    cliente: cliente,
                    contato: contato,
                    valor: valorLimpo,
                    vencimento: vencimento
                })
            });
            let data = await res.json();
            if(data.success) {
                alert(data.msg);
                document.getElementById("formCliente").value = "";
                document.getElementById("formContato").value = "";
                document.getElementById("formValor").value = "";
                document.getElementById("formVencimento").value = "";
                loadDashboardData();
            } else {
                alert(data.error);
            }
        }

        function handleLogout() {
            localStorage.removeItem("saas_user");
            location.reload();
        }
    </script>
</body>
</html>
